<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사이버렉카 관제 센터</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --p: #facc15; --bg: #050a18; --card: rgba(30, 41, 59, 0.7); --border: rgba(255, 255, 255, 0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
        body { background: var(--bg); color: #e2e8f0; display: flex; height: 100vh; overflow: hidden; }
        
        /* 인증 레이어 */
        #auth { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; justify-content: center; align-items: center; z-index: 999; }
        .auth-box { background: var(--card); padding: 40px; border-radius: 20px; border: 1px solid var(--p); text-align: center; }
        
        #wrap { display: none; width: 100%; height: 100%; }
        aside { width: 260px; background: #0a1227; border-right: 1px solid var(--border); padding: 30px 20px; }
        .nav { padding: 15px; margin-bottom: 8px; border-radius: 12px; cursor: pointer; font-weight: 600; color: #94a3b8; }
        .nav.active { background: var(--p); color: #000; }
        
        main { flex: 1; padding: 40px; overflow-y: auto; }
        .page { display: none; }
        .page.active { display: block; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 25px; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; }
        
        input, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; background: #000; border: 1px solid var(--border); color: #fff; outline: none; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-weight: 700; background: rgba(255,255,255,0.1); color: #fff; margin-bottom: 8px; }
        .btn:hover { background: var(--p); color: #000; }
        
        .admin-only { display: none; }
        .status-badge { padding: 8px 15px; border-radius: 8px; font-weight: bold; display: inline-block; margin-bottom: 10px; }
        .warn { background: #ef4444; color: white; }
        .safe { background: #10b981; color: white; }
    </style>
</head>
<body>

<div id="auth">
    <div class="auth-box">
        <h2 style="color:var(--p); margin-bottom:20px;">🔒 대원 인증</h2>
        <input type="password" id="pw" placeholder="비밀번호 입력" onkeypress="if(event.keyCode==13) login()">
        <button class="btn" style="background:var(--p); color:#000;" onclick="login()">접속하기</button>
    </div>
</div>

<div id="wrap">
    <aside>
        <div style="font-size: 22px; font-weight: 800; color: var(--p); text-align: center; margin-bottom: 40px;">🚨 사이버렉카</div>
        <div class="nav active" id="n1" onclick="tab('notice')">⚠️ 필독하세요</div>
        <div class="nav" id="n2" onclick="tab('main')">📋 메인 시스템</div>
        <div class="nav admin-only" id="n3" onclick="tab('admin')">🚫 블랙리스트 등재</div>
    </aside>

    <main>
        <div id="p-notice" class="page active">
            <div class="card">
                <h3>📢 필독 공지</h3>
                <p style="margin-top:15px; line-height:1.8;">모든 블랙리스트 데이터는 실시간으로 공유됩니다.</p>
            </div>
        </div>

        <div id="p-main" class="page">
            <div class="grid">
                <div class="card">
                    <h3>👤 압류 정보</h3>
                    <input type="text" id="uid" placeholder="고유번호"><input type="text" id="nick" placeholder="닉네임">
                    <button class="btn" onclick="cpW('exec')">집행차량 압류</button>
                    <button class="btn" onclick="cpW('norm')">일반 상황 압류</button>
                    <button class="btn" onclick="cpW('long')">장기 미접속 압류</button>
                    <button class="btn" onclick="cpW('gar')">메인 차고지 앞 압류</button>
                </div>
                <div class="card">
                    <h3>⚖️ 물품 계산기</h3>
                    <input type="number" id="t" placeholder="🛠 타이어" oninput="run()">
                    <input type="number" id="k" placeholder="📦 포장키트" oninput="run()">
                    <input type="number" id="c" placeholder="📜 계약서" oninput="run()">
                    <div style="background:rgba(0,0,0,0.3); padding:15px; border-radius:12px;">
                        <p>판매가: <span id="r1">0원</span></p>
                        <p style="color:var(--p);">공계(40%): <span id="r2">0원</span></p>
                    </div>
                    <button class="btn" onclick="cpC()" style="background:var(--p); color:#000; margin-top:10px;">내역 복사</button>
                </div>
                <div class="card">
                    <h3>🔍 블랙리스트 조회</h3>
                    <input type="text" id="search-uid" placeholder="조회할 고유번호 입력" oninput="searchBlack()">
                    <div id="black-view" style="margin-top:20px; text-align:center;">조회 대기 중...</div>
                </div>
            </div>
        </div>

        <div id="p-admin" class="page">
            <div class="card">
                <h3>🚫 블랙리스트 등재 (관리자 전용)</h3>
                <input type="text" id="reg-uid" placeholder="고유번호">
                <input type="text" id="reg-nick" placeholder="닉네임">
                <textarea id="reg-reason" placeholder="블랙리스트 사유"></textarea>
                <input type="text" id="reg-period" placeholder="블랙리스트 기간 (영구, 7일 등)"></input>
                <button class="btn" style="background:#ef4444;" onclick="pushBlack()">서버에 등재하기</button>
            </div>
        </div>
    </main>
</div>

<script>
    const USER_PW = "1234"; 
    const ADMIN_PW = "seongbeom99"; //
    const DB_URL = "https://cyber-mochi-default-rtdb.asia-southeast1.firebasedatabase.app/blacklist.json"; // ⚠️ 이 주소는 예시입니다. 본인 것으로 바꿔야 함!

    let remoteData = {};
    let isAdmin = false;

    // 인증 및 로그인
    function login() {
        const p = document.getElementById('1290').value;
        if(p === ADMIN_PW) {
            isAdmin = true;
            document.querySelectorAll('.admin-only').forEach(e => e.style.display = 'block');
            document.getElementById('auth').style.display = 'none';
            document.getElementById('wrap').style.display = 'flex';
            loadData();
        } else if(p === USER_PW) {
            document.getElementById('auth').style.display = 'none';
            document.getElementById('wrap').style.display = 'flex';
            loadData();
        } else { alert("비밀번호가 틀렸습니다."); }
    }

    async function loadData() {
        try {
            const res = await fetch(DB_URL);
            remoteData = await res.json() || {};
        } catch(e) { console.error("서버 연결 실패"); }
    }

    function searchBlack() {
        const val = document.getElementById('search-uid').value;
        const view = document.getElementById('black-view');
        if(!val) { view.innerHTML = "조회 대기 중..."; return; }

        let found = remoteData[val];
        if(found) {
            view.innerHTML = `<span class="status-badge warn">🚫 블랙리스트 대상</span><br><p style="color:#ef4444">사유: ${found.reason}</p><p>기간: ${found.period}</p>`;
        } else {
            view.innerHTML = `<span class="status-badge safe">✅ 정상 대원</span><br><p>기록이 없습니다.</p>`;
        }
    }

    async function pushBlack() {
        const uid = document.getElementById('reg-uid').value;
        const nick = document.getElementById('reg-nick').value;
        const reason = document.getElementById('reg-reason').value;
        const period = document.getElementById('reg-period').value;
        
        if(!uid || !reason) return alert("필수 정보를 입력하세요!");

        await fetch(DB_URL.replace('.json', `/${uid}.json`), {
            method: 'PUT',
            body: JSON.stringify({ uid, nick, reason, period })
        });
        
        alert("서버 등재 완료!");
        loadData();
    }

    // 탭 이동 및 기타 기능들... (생략 없이 위 코드에 포함됨)
    function tab(n) {
        document.querySelectorAll('.page, .nav').forEach(el => el.classList.remove('active'));
        document.getElementById('p-' + n).classList.add('active');
        document.getElementById('n' + (n==='notice'?'1':n==='main'?'2':'3')).classList.add('active');
    }

    function run() {
        const t = (parseInt(document.getElementById('t').value)||0)*10000000;
        const k = (parseInt(document.getElementById('k').value)||0)*200000000;
        const c = (parseInt(document.getElementById('c').value)||0)*200000000;
        document.getElementById('r1').innerText = (t+k+c).toLocaleString() + "원";
        document.getElementById('r2').innerText = ((t+k+c)*0.4).toLocaleString() + "원";
    }

    function cpW(type) {
        const u = document.getElementById('uid').value || "미입력";
        const n = document.getElementById('nick').value || "미입력";
        let m = `/사이버렉카 공지\n고번: ${u} / 닉네임: ${n}\n`;
        m += (type==='exec'?"범죄차량 즉시압류":type==='norm'?"방치차량 1분뒤압류":type==='long'?"장기미접속압류":"차고지앞압류");
        clip(m);
    }

    function cpC() {
        clip(`[ 정산 ]\n총액: ${document.getElementById('r1').innerText}\n공계입금: ${document.getElementById('r2').innerText}`);
    }

    function clip(t) {
        const a = document.createElement('textarea');
        a.value = t; document.body.appendChild(a); a.select();
        document.execCommand('copy'); document.body.removeChild(a);
        alert("복사됨!");
    }
</script>
</body>
</html>
