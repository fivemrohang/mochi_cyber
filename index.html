<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사이버렉카 전용 컨트롤 센터</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #050a18;
            --bg-side: #0a1227;
            --bg-card: rgba(30, 41, 59, 0.6);
            --primary: #facc15;
            --accent: #ffc947;
            --danger: #ff5252;
            --success: #10b981;
            --text: #e2e8f0;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
        body { background-color: var(--bg-main); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        /* 인증 화면 */
        #auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-main); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
        }
        .auth-box {
            background: var(--bg-card); padding: 40px; border-radius: 20px;
            border: 1px solid var(--primary); text-align: center;
        }
        .auth-box input { 
            width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 10px; 
            background: #000; border: 1px solid var(--border); color: white; text-align: center;
        }
        .auth-box button { width: 100%; padding: 12px; border-radius: 10px; border:none; background: var(--primary); font-weight: bold; cursor: pointer; }

        /* 메인 레이아웃 */
        #main-wrapper { display: none; width: 100%; height: 100%; }
        aside { width: 260px; background: var(--bg-side); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 30px 20px; }
        .nav-item { padding: 15px; margin-bottom: 8px; border-radius: 12px; cursor: pointer; color: #94a3b8; font-weight: 600; }
        .nav-item.active { background: var(--primary); color: #000; }

        main { flex: 1; padding: 40px; overflow-y: auto; }
        .page { display: none; }
        .page.active { display: block; }
        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; padding: 25px; margin-bottom: 20px; }
        
        input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; background: #000; border: 1px solid var(--border); color: white; }
        .action-btn { padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-weight: 700; background: rgba(255,255,255,0.08); color: white; width: 100%; margin-bottom: 5px;}
        .action-btn:hover { background: var(--primary); color: #000; }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-box">
        <h2 style="color:var(--primary); margin-bottom:20px;">🔒 시스템 인증</h2>
        <input type="password" id="passcode" placeholder="코드를 입력하세요" onkeypress="if(event.keyCode==13) checkAuth()">
        <button onclick="checkAuth()">접속하기</button>
    </div>
</div>

<div id="main-wrapper">
    <aside>
        <div style="font-size: 22px; font-weight: 800; color: var(--primary); text-align: center; margin-bottom: 40px;">🚨 사이버렉카</div>
        <div class="nav-item active" id="btn-notice" onclick="tab('notice')">⚠️ 필독하세요</div>
        <div class="nav-item" id="btn-main" onclick="tab('main')">📋 메인 시스템</div>
    </aside>

    <main>
        <div id="page-notice" class="page active">
            <div class="card">
                <h3>📢 사용법 공지</h3>
                <p style="line-height:2; margin-top:15px; color:#cbd5e1;">
                    1. 메인 시스템 메뉴 진입<br>
                    2. 정보 기재 후 압류 버튼 클릭<br>
                    3. 인게임 채팅창에 붙여넣기<br>
                    4. 계산기 확인 후 공동계좌 40% 입금
                </p>
            </div>
        </div>

        <div id="page-main" class="page">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="card">
                    <h3>👤 압류 정보</h3>
                    <input type="text" id="uid" placeholder="고유번호">
                    <input type="text" id="nick" placeholder="닉네임">
                    <button class="action-btn" onclick="copyW('exec')">집행차량 압류</button>
                    <button class="action-btn" onclick="copyW('normal')">일반 상황 압류</button>
                </div>
                <div class="card">
                    <h3>⚖️ 계산기</h3>
                    <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                        <span>🛠 타이어</span><input type="number" id="t" style="width:60px; margin:0;" value="0" oninput="calc()">
                    </div>
                    <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                        <span>📦 포장키트</span><input type="number" id="k" style="width:60px; margin:0;" value="0" oninput="calc()">
                    </div>
                    <div style="border-top:1px solid #333; padding-top:10px; margin-top:10px;">
                        <div style="display:flex; justify-content:space-between;"><span>총액:</span> <span id="r1">0원</span></div>
                        <div style="display:flex; justify-content:space-between; color:var(--primary);"><span>공계(40%):</span> <span id="r2">0원</span></div>
                    </div>
                    <button class="action-btn" onclick="copyC()" style="background:var(--primary); color:black; margin-top:10px;">복사하기</button>
                </div>
            </div>
        </div>
    </main>
</div>

<script>
    const PW = "0221"; // 🔑 비밀번호

    // 인증 함수
    function checkAuth() {
        if (document.getElementById('passcode').value === PW) {
            sessionStorage.setItem('ok', 'true');
            go();
            alert('인증에 성공하였습니다 !');
        } else {
            alert('비밀번호가 틀렸습니다.');
        }
    }

    function go() {
        document.getElementById('auth-overlay').style.display = 'none';
        document.getElementById('main-wrapper').style.display = 'flex';
    }

    // 페이지 로드 시 체크
    if (sessionStorage.getItem('ok') === 'true') { go(); }

    // 탭 전환
    function tab(name) {
        document.getElementById('page-notice').classList.remove('active');
        document.getElementById('page-main').classList.remove('active');
        document.getElementById('btn-notice').classList.remove('active');
        document.getElementById('btn-main').classList.remove('active');
        
        document.getElementById('page-' + name).classList.add('active');
        document.getElementById('btn-' + name).classList.add('active');
    }

    // 계산기
    function calc() {
        const t = (parseInt(document.getElementById('t').value) || 0) * 10000000;
        const k = (parseInt(document.getElementById('k').value) || 0) * 200000000;
        const total = t + k;
        document.getElementById('r1').innerText = total.toLocaleString() + "원";
        document.getElementById('r2').innerText = (total * 0.4).toLocaleString() + "원";
    }

    // 복사 공통
    function clip(txt) {
        const el = document.createElement('textarea');
        el.value = txt; document.body.appendChild(el);
        el.select(); document.execCommand('copy');
        document.body.removeChild(el);
        alert('복사되었습니다!');
    }

    function copyW(type) {
        const u = document.getElementById('uid').value || "미입력";
        const n = document.getElementById('nick').value || "미입력";
        let m = `/사이버렉카 공지\n고번: ${u} / 닉네임: ${n}\n`;
        m += (type === 'exec') ? "범죄 차량 즉시 압류합니다." : "방치 차량 1분 뒤 압류합니다.";
        clip(m);
    }

    function copyC() {
        const m = `[ 정산 ]\n총액: ${document.getElementById('r1').innerText}\n공계입금: ${document.getElementById('r2').innerText}`;
        clip(m);
    }
</script>
</body>
</html>
